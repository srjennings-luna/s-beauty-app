# iOS Build + TestFlight upload
#
# Cloud-build pipeline for the Contueri iOS app per the v1.0 Launch Plan
# (KALLOS-v1-Launch-Plan.html, W1 scope). Builds the Capacitor iOS app
# on a GitHub-hosted macOS runner, signs with the distribution
# certificate from Fastlane Match, uploads to TestFlight via Fastlane
# Deliver. Zero dependency on Sheri's laptop.
#
# This workflow is the scaffold; the cert + secret wiring activates
# once the Apple Developer account is enrolled (Individual, per
# DEV-01 lock). Until then the workflow runs on push to main, fails
# at the Match step, and surfaces a clear error. Set the secrets
# listed below before enabling the workflow.
#
# REQUIRED GITHUB ACTIONS SECRETS (add via repo Settings -> Secrets
# and variables -> Actions):
#
#   APPLE_ID
#     Sheri's Apple ID email used for the Developer account.
#
#   APPLE_TEAM_ID
#     10-character team identifier from
#     https://developer.apple.com/account/#/membership (visible
#     once Individual enrollment activates).
#
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_API_KEY_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY_CONTENT
#     App Store Connect API key (preferred over Apple ID password
#     for automation). Generate at
#     https://appstoreconnect.apple.com/access/api after enrollment.
#     The _CONTENT secret holds the .p8 file contents verbatim
#     (multi-line, including the BEGIN/END markers).
#
#   MATCH_PASSWORD
#     Passphrase used to encrypt the certificate repo. Set this
#     once; the same value must be used when running
#     `fastlane match init` locally.
#
#   MATCH_GIT_URL
#     SSH URL of the private repo that stores the encrypted
#     certificates (e.g., git@github.com:srjennings-luna/contueri-certs.git).
#     The repo can be empty at creation; `fastlane match` populates
#     it on first run.
#
#   MATCH_GIT_BASIC_AUTHORIZATION
#     Base64-encoded "username:personal-access-token" for the
#     certificate repo, used by Match to clone in CI without SSH
#     keys. Set this only if MATCH_GIT_URL is https://; for ssh://
#     URLs use SSH_PRIVATE_KEY instead.
#
# OPTIONAL SECRETS:
#
#   SSH_PRIVATE_KEY
#     Used in place of MATCH_GIT_BASIC_AUTHORIZATION if MATCH_GIT_URL
#     is an ssh:// URL. The matching public key must be added as a
#     deploy key on the cert repo.
#
# When all required secrets are present, push to main triggers a
# build that uploads to TestFlight automatically. Sheri reviews the
# build in TestFlight on her phone; no Xcode required.

name: iOS Build + TestFlight

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when something that affects the iOS bundle changes.
      # Avoids burning runner minutes on doc-only commits.
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'sanity/**'
      - 'capacitor.config.ts'
      - 'capacitor.config.json'
      - 'ios/**'
      - 'fastlane/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    # Manual trigger from the Actions tab; useful for re-running a
    # build without pushing.

# Cancel any in-flight build when a newer commit arrives. Saves runner
# minutes when commits land rapidly.
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    # Runner upgraded from macos-14 (Xcode 15) to macos-15 (Xcode 16).
    # @capacitor/status-bar 8.0.x and @capacitor/splash-screen 8.0.x
    # both call into `capacitor-swift-pm` 8.4.0 binary APIs that are
    # gated behind `#if compiler(>=5.3) && $NonescapableTypes` (a
    # Swift 6 experimental feature). Without a Swift 6-capable
    # toolchain (Xcode 16+), the compiler treats `PluginConfig.getString`,
    # `UIColor.capacitor.color(fromHex:)`, `CAPBridgeProtocol.webView`,
    # and `CAPBridgeProtocol.viewController` as undefined, and the
    # plugin Swift files fail to compile. Xcode 16 on macos-15
    # enables `$NonescapableTypes` so the gated APIs resolve.

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          # macos-15 ships with multiple Xcode versions installed
          # under /Applications/Xcode_<ver>.app. Pick the highest 16.x
          # available so the build is deterministic across runner
          # image updates but still tracks security patches.
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 16.x found on runner"
            ls /Applications/ | grep -i xcode || true
            exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
        # Ruby pinned to 3.1 (was 3.3) because Sheri's Gemfile.lock
        # was originally generated on macOS system Ruby 2.6, and the
        # locked CFPropertyList 3.0.9 (a transitive Fastlane dep)
        # declares `required_ruby_version < 3.2` — incompatible with
        # CI's Ruby 3.3.x. Ruby 3.1 satisfies that constraint AND is
        # fully supported by Fastlane 2.224 + the rest of the gem
        # set. Long-term cleanup: regenerate Gemfile.lock on a system
        # running Ruby 3.x so all gems resolve to versions
        # compatible with modern Ruby, then bump CI back to 3.3.
        # Fastlane is invoked via bundler so the version is pinned in
        # Gemfile.lock. Bundler-cache speeds up subsequent runs by
        # caching the Gem install.

      # ── Capacitor sync ─────────────────────────────────────────────
      # The Capacitor live-URL approach means the iOS shell just loads
      # contueri.app; we still run `cap sync` so any native plugin
      # config (OneSignal, MediaSession audio, etc.) lands in the iOS
      # project before the build.
      - name: Capacitor sync iOS
        run: npx cap sync ios
        # TODO (W1 Capacitor scaffold): this step assumes the ios/
        # directory exists with the Xcode project. Until W1 lands
        # Capacitor + creates the ios/ scaffold, this step fails fast
        # which is the correct behavior.

      # ── Certificates via Fastlane Match ─────────────────────────────
      # Match fetches the distribution cert + provisioning profile
      # from the encrypted private cert repo, decrypts with
      # MATCH_PASSWORD, and installs into the runner's keychain.
      - name: Install certificates via Fastlane Match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_FORCE_LEGACY_ENCRYPTION: ${{ secrets.MATCH_FORCE_LEGACY_ENCRYPTION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane match appstore --readonly
        # TODO (post Apple Dev activation): the first time Match runs,
        # it must be invoked locally with `fastlane match appstore`
        # (without --readonly) to generate the cert + profile and
        # push them to MATCH_GIT_URL. Subsequent CI runs use
        # --readonly to fetch only.

      # ── Build + upload via Fastlane ─────────────────────────────────
      # The `deploy_testflight` lane in fastlane/Fastfile bumps the
      # build number, runs `xcodebuild archive` against the Capacitor
      # iOS scheme, signs with the Match-installed profile, and uploads
      # the resulting .ipa to TestFlight via App Store Connect API.
      - name: Build and upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # Match config also needed in this step because the
          # deploy_testflight Fastlane lane re-references match
          # (e.g., for code signing identity lookup or any in-lane
          # match call). Without these, Fastlane errors with
          # "No value found for 'git_url'" even though the previous
          # Match step succeeded.
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_FORCE_LEGACY_ENCRYPTION: ${{ secrets.MATCH_FORCE_LEGACY_ENCRYPTION }}
        run: bundle exec fastlane ios deploy_testflight

      - name: Upload .ipa artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: contueri-ios-build
          path: ios/build/*.ipa
          retention-days: 7
          if-no-files-found: warn
        # Keeps the signed .ipa around for 7 days as a fallback in
        # case TestFlight upload succeeded but the build needs to be
        # re-uploaded manually for some reason.
